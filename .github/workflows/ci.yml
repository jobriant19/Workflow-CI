name: MLflow CI and Docker Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run MLflow Project
      run: |
        # Menggunakan env-manager local agar lebih cepat di GitHub Actions
        mlflow run MLProject/ --env-manager local

    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        # Mencari ID eksperimen yang baru saja sukses dijalankan
        RUN_ID=$(ls -td mlruns/0/* | head -1 | xargs basename)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Berhasil mendapatkan Run ID: $RUN_ID"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Model
      run: |
        # Membangun docker image dari artefak model MLflow
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n ${{ secrets.DOCKER_USERNAME }}/ethereum_fraud_model:latest

    - name: Push Docker Image
      run: |
        # Mendorong image ke repository Docker Hub Anda
        docker push ${{ secrets.DOCKER_USERNAME }}/ethereum_fraud_model:latest