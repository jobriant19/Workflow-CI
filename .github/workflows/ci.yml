name: MLflow CI and Docker Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run MLflow Project
      run: |
        # Menggunakan env-manager local agar lebih cepat di GitHub Actions
        mlflow run MLProject/ --env-manager local

    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        # Mencari ID eksperimen yang baru saja sukses dijalankan
        RUN_ID=$(ls -td mlruns/0/* | head -1 | xargs basename)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Berhasil mendapatkan Run ID: $RUN_ID"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Model (Bypass Version)
      run: |
        # 1. Keluarkan resep Dockerfile dari MLflow ke dalam folder baru
        mlflow models generate-dockerfile -m "runs:/${{ env.RUN_ID }}/model" -d docker_build_dir
        
        # 2. Paksa ganti URL pip yang rusak dengan URL khusus Python 3.9
        sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' docker_build_dir/Dockerfile
        
        # 3. Rakit Docker Image secara manual
        docker build docker_build_dir -t ${{ secrets.DOCKER_USERNAME }}/ethereum_fraud_model:latest
        
        # 4. Dorong image ke Docker Hub
        docker push ${{ secrets.DOCKER_USERNAME }}/ethereum_fraud_model:latest